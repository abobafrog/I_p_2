services:
  - type: web
    name: froggy-coder-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: FROGGY_ADMIN_USERNAME
        value: frog_admin
      - key: FROGGY_ADMIN_PASSWORD
        sync: false
      - key: FROGGY_DB_PATH
        value: /opt/render/project/src/data/froggy_coder.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  - type: web
    name: froggy-coder-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
